site_name: Odoo 19 Masterclass
site_description: The ultimate Zero-to-Senior guide for Odoo 19 development.
site_author: Kashyap Patel
site_url: https://odoo19-docs.kashyap6334.workers.dev/
copyright: "Copyright &copy; 2026 Kashyap Patel - Odoo 19 Masterclass"

theme:
  name: material
  logo: images/logo.svg
  favicon: images/logo.svg
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.footer
    - navigation.top
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - content.tabs.link
    - toc.follow

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      type: date
      enable_creation_date: true

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/kashyap-patel6334/
      name: Connect with Kashyap on LinkedIn
    - icon: fontawesome/brands/github
      link: https://github.com/Kashyap-001
      name: View my GitHub Profile

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/progress.js
  - javascripts/quiz.js
  - javascripts/feedback.js
  - javascripts/dashboard.js
  - javascripts/shortcuts.js

markdown_extensions:
  - abbr
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg

